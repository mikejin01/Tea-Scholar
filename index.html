<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tea Scholar | Premium Boba Tea</title>
    <meta
      name="description"
      content="Tea Scholar — elevating the boba tea experience through scholarly dedication to craft, quality, and community."
    />
    <link rel="icon" type="image/png" href="./tea_scholar_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      // Apply the persisted theme before paint to avoid a flash.
      if (localStorage.theme === "dark") {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 font-serif antialiased flex flex-col min-h-screen transition-colors duration-300"
  >
    <div id="root" class="contents"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
